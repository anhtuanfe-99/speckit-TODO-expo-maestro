- tapOn:
    text: "speckit-todo-expo-maestro"
- extendedWaitUntil:
    visible: task_input
    timeout: 10000
- tapOn:
    id: task_input
- tapOn:
    id: add_button
- assertVisible:
    id: task_input
- assertNotVisible:
    id: task_checkbox
    index: 0
