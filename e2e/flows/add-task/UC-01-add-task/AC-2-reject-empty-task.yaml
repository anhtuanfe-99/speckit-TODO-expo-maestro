# spec: specs/001-add-task/spec.md
# use-case: UC-01
# ac: AC-2
# scenario: User tries to add an empty task
# test-name: UC-01_AC-2_reject-empty-task
# protocol: changes require PROTOCOL B

appId: host.exp.Exponent
---
