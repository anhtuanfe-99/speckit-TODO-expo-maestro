- waitForVisible:
    id: task_item
- tapOn:
    id: task_checkbox
    index: 1
- waitForVisible:
    id: filter_all
- tapOn:
    id: filter_all
- assertVisible:
    text: "Active task"
- assertVisible:
    text: "Completed task"
