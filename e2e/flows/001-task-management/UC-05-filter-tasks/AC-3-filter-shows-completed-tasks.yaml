# spec: specs/001-task-management/spec.md
# use-case: UC-05
# ac: AC-3
# scenario: Filter shows completed tasks only
# test-name: UC-05_AC-3_filter-shows-completed-tasks
# protocol: changes require PROTOCOL B

appId: host.exp.Exponent
---
- launchApp:
    appId: host.exp.Exponent
- waitForVisible:
    id: task_input
- inputText:
    id: task_input
    text: "Active task"
- pressKey: Enter
- waitForVisible:
    id: task_item
- inputText:
    id: task_input
    text: "Completed task"
- pressKey: Enter
- waitForVisible:
    id: task_item
- tapOn:
    id: task_checkbox
    index: 1
- waitForVisible:
    id: filter_completed
- tapOn:
    id: filter_completed
- assertVisible:
    text: "Completed task"
- assertNotVisible:
    text: "Active task"
