# spec: specs/001-task-management/spec.md
# use-case: UC-05
# ac: AC-2
# scenario: Filter shows active tasks only
# test-name: UC-05_AC-2_filter-shows-active-tasks
# protocol: changes require PROTOCOL B

appId: host.exp.Exponent
---
- launchApp:
    appId: host.exp.Exponent
- waitForVisible:
    id: task_input
- inputText:
    id: task_input
    text: "Active task"
- pressKey: Enter
- waitForVisible:
    id: task_item
- inputText:
    id: task_input
    text: "Completed task"
- pressKey: Enter
- waitForVisible:
    id: task_item
- tapOn:
    id: task_checkbox
    index: 1
- waitForVisible:
    id: filter_active
- tapOn:
    id: filter_active
- assertVisible:
    text: "Active task"
- assertNotVisible:
    text: "Completed task"
