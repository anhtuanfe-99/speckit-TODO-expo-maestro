# protocol: changes require PROTOCOL B

appId: host.exp.Exponent
---
- launchApp:
    appId: host.exp.Exponent
- waitForVisible:
    id: task_input
- inputText:
    id: task_input
    text: "Buy groceries"
- pressKey: Enter
- waitForVisible:
    id: task_item
- tapOn:
    id: task_title
- eraseText: 13
- inputText:
    id: task_title
    text: "Buy vegetables"
- pressKey: Enter
- assertVisible:
    text: "Buy vegetables"
